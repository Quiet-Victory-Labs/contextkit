<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossary — ContextKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #D4A855;
      --gold-light: #E8C878;
      --gold-dark: #A07D3A;
      --gold-glow: rgba(212, 168, 85, 0.15);
      --bg: #0A0A0C;
      --bg-card: #111114;
      --bg-elevated: #18181C;
      --text: #E8E6E1;
      --text-muted: #8A8880;
      --text-dim: #5A5850;
      --border: #2A2A2E;
      --green: #4ADE80;
      --green-dim: rgba(74, 222, 128, 0.12);
      --blue: #60A5FA;
      --red: #F87171;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* === GRAIN OVERLAY === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* === LAYOUT === */
    .page { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 6rem; }
    .section { margin-bottom: 3rem; }
    .section-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 0.75rem;
    }
    .section h2, h2.section-title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .section-intro {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 600px;
      margin-bottom: 2rem;
      font-weight: 300;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 0 auto;
    }

    /* === HERO (index page) === */
    .hero {
      text-align: center;
      padding: 5rem 2rem 4rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      position: relative;
    }
    .hero h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
      position: relative;
    }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 520px;
      margin: 1.5rem auto 0;
      font-weight: 300;
      position: relative;
    }

    /* === STATS === */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 3rem;
    }
    .stat {
      background: var(--bg-card);
      padding: 1.5rem;
      text-align: center;
    }
    .stat-value {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* === CARDS === */
    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      background: var(--bg-card);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      border-color: var(--gold-dark);
      box-shadow: 0 0 40px rgba(212,168,85,0.06);
    }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
    .card-grid-sm { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }

    /* === TAGS === */
    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .tag-gold { color: var(--gold); border-color: rgba(212,168,85,0.3); background: rgba(212,168,85,0.08); }
    .tag-silver { color: #C0C0C0; border-color: rgba(192,192,192,0.3); background: rgba(192,192,192,0.08); }
    .tag-bronze { color: #CD7F32; border-color: rgba(205,127,50,0.3); background: rgba(205,127,50,0.08); }
    .tag-none { color: var(--text-dim); border-color: var(--border); }
    .tag-green { color: var(--green); border-color: rgba(74,222,128,0.3); background: var(--green-dim); }
    .tag-red { color: var(--red); border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
    .tag-blue { color: var(--blue); border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.08); }
    .tag-nav {
      padding: 0.35rem 0.75rem;
      font-size: 0.65rem;
      border-radius: 6px;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .tag-nav:hover { border-color: var(--gold); text-decoration: none; }

    /* === TABLES (dark) === */
    .table-dark { width: 100%; border-collapse: collapse; }
    .table-dark th {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .table-dark td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(42,42,46,0.5);
      font-size: 0.85rem;
      vertical-align: top;
    }
    .table-dark tr:hover td { background: rgba(212,168,85,0.02); }
    .mono { font-family: var(--mono); font-size: 0.82rem; }

    /* === SEMANTIC ROLE PILLS === */
    .role-identifier { color: var(--gold); border-color: rgba(212,168,85,0.3); background: rgba(212,168,85,0.08); }
    .role-metric { color: #06B6D4; border-color: rgba(6,182,212,0.3); background: rgba(6,182,212,0.08); }
    .role-dimension { color: #818CF8; border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.08); }
    .role-date { color: var(--green); border-color: rgba(74,222,128,0.3); background: var(--green-dim); }
    .role-attribute { color: var(--text-muted); border-color: var(--border); }

    /* === DS TYPE PILLS === */
    .ds-type {
      font-family: var(--mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      display: inline-block;
    }
    .ds-type-fact { color: #818CF8; background: rgba(129,140,248,0.1); }
    .ds-type-dimension { color: #34D399; background: rgba(52,211,153,0.1); }
    .ds-type-event { color: #FB923C; background: rgba(251,146,60,0.1); }
    .ds-type-view { color: #A78BFA; background: rgba(167,139,250,0.1); }

    /* === METRIC CARDS === */
    .metric-name {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--gold-light);
      margin-bottom: 0.5rem;
    }
    .metric-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .metric-formula {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      line-height: 1.5;
      overflow-x: auto;
    }

    /* === QUERY CARDS === */
    .query-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      background: var(--bg-card);
      transition: border-color 0.3s;
    }
    .query-card:hover { border-color: var(--gold-dark); }
    .query-question {
      padding: 1.25rem 1.5rem;
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .query-question::before {
      content: 'Q';
      font-family: var(--mono);
      font-size: 0.6rem;
      font-style: normal;
      letter-spacing: 0.1em;
      color: var(--gold);
      background: rgba(212,168,85,0.1);
      border: 1px solid rgba(212,168,85,0.2);
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 0.3rem;
    }
    .query-sql {
      padding: 1rem 1.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.6;
      background: var(--bg);
      overflow-x: auto;
      white-space: pre-wrap;
    }
    .query-meta {
      padding: 0.6rem 1.5rem;
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    /* === GUARDRAILS === */
    .guardrail {
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      background: rgba(248, 113, 113, 0.03);
      margin-bottom: 1rem;
    }
    .guardrail-name {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--red);
      margin-bottom: 0.4rem;
    }
    .guardrail-filter {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      background: var(--bg);
      padding: 0.4rem 0.65rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: inline-block;
      margin-bottom: 0.6rem;
    }
    .guardrail-reason {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* === LINEAGE === */
    .lineage-flow {
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow-x: auto;
      padding: 1.5rem 0;
    }
    .lineage-col {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 220px;
    }
    .lineage-col-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.25rem;
      padding-left: 0.5rem;
    }
    .lineage-node {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      transition: border-color 0.3s;
    }
    .lineage-node:hover { border-color: var(--gold-dark); }
    .lineage-node-name {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .lineage-node-detail {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .lineage-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      color: var(--gold-dark);
      font-size: 1.3rem;
    }

    /* === SCORECARD === */
    .scorecard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    @media (max-width: 768px) { .scorecard { grid-template-columns: 1fr; } }
    .scorecard-tier {
      background: var(--bg-card);
      padding: 1.5rem;
    }
    .scorecard-tier-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .scorecard-tier-name {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 500;
      text-transform: capitalize;
    }
    .scorecard-tier-name.bronze { color: #CD7F32; }
    .scorecard-tier-name.silver { color: #C0C0C0; }
    .scorecard-tier-name.gold { color: var(--gold); }
    .scorecard-pass {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }
    .scorecard-pass.passed { color: var(--green); background: var(--green-dim); }
    .scorecard-pass.failed { color: var(--red); background: rgba(248,113,113,0.1); }
    .check-list { list-style: none; }
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      padding: 0.3rem 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .check-icon { flex-shrink: 0; margin-top: 1px; font-size: 0.8rem; }
    .check-icon.pass { color: var(--green); }
    .check-icon.fail { color: var(--red); }

    /* === GLOSSARY === */
    .glossary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .glossary-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      background: var(--bg-card);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .glossary-card:hover { border-color: var(--gold-dark); }
    .glossary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-dark), transparent);
    }
    .glossary-term {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .glossary-def {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      font-weight: 300;
    }

    /* === EXPANDABLE === */
    .expandable-header {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .expand-icon {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--text-dim);
      transition: transform 0.2s;
      width: 20px;
      text-align: center;
    }
    .expandable-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    /* === SEARCH === */
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1.2rem;
      font-family: var(--sans);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus {
      border-color: var(--gold-dark);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    /* === BACK LINK === */
    .back-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--gold); text-decoration: none; }

    /* === GOVERNANCE GRID === */
    .gov-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .gov-item {
      background: var(--bg-card);
      padding: 1rem 1.25rem;
    }
    .gov-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }
    .gov-value {
      font-size: 0.9rem;
      color: var(--text);
    }

    /* === ANIMATIONS === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(25px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* === SQL HIGHLIGHT === */
    .sql-kw { color: #818CF8; }
    .sql-fn { color: #34D399; }
    .sql-str { color: #FCD34D; }
    .sql-num { color: #FB923C; }
    .sql-cm { color: var(--text-dim); font-style: italic; }
  </style>
</head>
<body>
<nav style="position:sticky;top:0;z-index:100;background:var(--bg-card);border-bottom:1px solid var(--border);padding:0.75rem 2rem;display:flex;align-items:center;gap:2rem;">
  <a href="./index.html" style="font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--gold);text-decoration:none;">ContextKit</a>
  <div style="display:flex;gap:1.5rem;font-size:0.82rem;">
    <a href="./index.html" style="color:var(--text-muted);text-decoration:none;">Models</a>
    <a href="./glossary.html" style="color:var(--text-muted);text-decoration:none;">Glossary</a>
    <a href="./search.html" style="color:var(--text-muted);text-decoration:none;">Search</a>
  </div>
</nav>

<main class="page">
  <h1 style="font-family:var(--serif);font-weight:300;font-size:clamp(2rem,5vw,3.5rem);color:var(--text);margin-bottom:0.5rem;">Glossary</h1>
  <p style="color:var(--text-muted);font-size:1rem;margin-bottom:2rem;font-weight:300;">Business term definitions and mappings.</p>

  
  
    <p style="color:var(--text-muted);">No terms defined.</p>
  
</main>

<footer style="text-align:center;padding:3rem 2rem;color:var(--text-dim);font-size:0.78rem;border-top:1px solid var(--border);margin-top:4rem;">
  Generated by <a href="https://github.com/erickittelson/ContextKit" style="color:var(--gold-dark);">ContextKit</a>
</footer>
<script>
(function() {
  // Scroll-reveal observer
  var reveals = document.querySelectorAll('.reveal');
  if (reveals.length > 0 && 'IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(function(el) { observer.observe(el); });
  } else {
    reveals.forEach(function(el) { el.classList.add('visible'); });
  }

  // Expandable sections
  window.toggleExpand = function(id) {
    var el = document.getElementById(id);
    var icon = document.getElementById(id + '-icon');
    if (!el) return;
    if (el.style.maxHeight && el.style.maxHeight !== '0px') {
      el.style.maxHeight = '0px';
      if (icon) icon.textContent = '+';
    } else {
      el.style.maxHeight = el.scrollHeight + 'px';
      if (icon) icon.textContent = '\u2212';
    }
  };

  // Simple SQL syntax highlighter — operates on trusted template-rendered content
  window.highlightSQL = function() {
    var blocks = document.querySelectorAll('.sql-highlight');
    var kw = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|CROSS|ON|AND|OR|NOT|IN|AS|GROUP|BY|ORDER|HAVING|LIMIT|OFFSET|UNION|ALL|DISTINCT|CASE|WHEN|THEN|ELSE|END|IS|NULL|BETWEEN|LIKE|EXISTS|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|SET|VALUES|INTO|WITH|DESC|ASC|OVER|PARTITION|WINDOW|FILTER|LATERAL|UNNEST|TRUE|FALSE)\b/gi;
    var fn = /\b(SUM|COUNT|AVG|MIN|MAX|ROUND|COALESCE|CAST|NULLIF|ABS|UPPER|LOWER|LENGTH|TRIM|SUBSTRING|CONCAT|ROW_NUMBER|RANK|DENSE_RANK|LAG|LEAD|FIRST_VALUE|LAST_VALUE|NTILE|PERCENTILE_CONT|STRING_AGG|ARRAY_AGG|LIST|STRUCT_PACK)\b/gi;
    var str = /('(?:[^'\\]|\\.)*')/g;
    var num = /\b(\d+\.?\d*)\b/g;

    blocks.forEach(function(block) {
      var text = block.textContent || '';
      text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      text = text.replace(str, '<span class="sql-str">$1</span>');
      text = text.replace(kw, '<span class="sql-kw">$&</span>');
      text = text.replace(fn, '<span class="sql-fn">$&</span>');
      block.innerHTML = text;
    });
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window.highlightSQL);
  } else {
    window.highlightSQL();
  }
})();
</script>
<script>
(function() {
  var input = document.getElementById('glossary-filter');
  if (!input) return;
  var cards = document.querySelectorAll('.glossary-card');
  input.addEventListener('input', function() {
    var q = input.value.toLowerCase();
    cards.forEach(function(card) {
      var text = card.textContent.toLowerCase();
      card.style.display = text.indexOf(q) !== -1 ? '' : 'none';
    });
  });
})();
</script>
</body>
